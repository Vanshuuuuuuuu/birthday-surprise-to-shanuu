<!DOCTYPE html>
<html>
<head>
    <title>Hey You :)</title>

    <style>
        body {
            background: linear-gradient(270deg, #ff9a9e, #fad0c4, #a18cd1, #fbc2eb);
            background-size: 800% 800%;
            animation: gradientBG 10s ease infinite;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 80px;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% {background-position: 0%}
            50% {background-position: 100%}
            100% {background-position: 0%}
        }

        h1 {
            font-size: 40px;
        }

        button {
            padding: 14px 25px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            background: white;
            color: #ff4b5c;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255,255,255,0.6);
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.1);
        }

        .box {
            margin-top: 30px;
            display: none;
        }

        img {
            width: 260px;
            border-radius: 20px;
            margin-top: 20px;
            display: none;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        .floating {
            position: absolute;
            width: 8px;
            height: 8px;
            background: white;
            opacity: 0.3;
            border-radius: 50%;
            animation: float 10s infinite;
        }

        @keyframes float {
            from {transform: translateY(0);}
            to {transform: translateY(-800px);}
        }
    </style>
</head>

<body>

<h1>🎂 Happy Birthday ✨</h1>
<p>So… I made something for you</p>

<button onclick="nextStep()">Start</button>

<div id="content" class="box">
    <p id="text"></p>
    <img id="slide">
</div>

<audio autoplay loop>
    <source src="freesound_community-birthday-card-73275.mp3" type="audio/mpeg">
</audio>

<script>
let step = 0;
let i = 0;

const messages = "[happiest birthday my shanuu
   " I wasn't abe to anything special for u but I wished to make u feel special on this birthday 
      "  you are the one who is always special to me.
        "You are actually one of my favourite people",
"Talking to you is the best part of my day sometimes"
    "maybe ig u are angry from me maybe idk u lost intrest in our friendship but I am always the promise keeper
   " no matter whatever happen if u ever need me I will always be ur side 
    "never think there is something about ego or anger form ther start I everything aside for u 
    "just want to say thanku for making me feel special even for some time but I am happy to be that and glad that ur in my Life
   " And always love to everyone your family and specially to my cutu shivi <3",
    "Okay so… I didn’t know what to gift you 😅",
    "So I tried making something instead",
    "This took more effort than expected tbh",
    "But yeah… you’re really special",
    "Talking to you just feels different",
    "So I thought this might make you smile 🙂",
        "I hape I had made this birthday a bit special for u just by my small gesture",
];

const images = [
    "shanu_1.jpg",
    "shanu_2.jpg",
    "shanu_3.jpg",
    "shanu_4.jpg",
    "shanu_5.jpg"
];

function typeWriter(text, callback) {
    let speed = 30;
    document.getElementById("text").innerHTML = "";
    i = 0;

    function typing() {
        if (i < text.length) {
            document.getElementById("text").innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        } else if (callback) {
            callback();
        }
    }
    typing();
}

function nextStep() {
    document.getElementById("content").style.display = "block";

    if (step < messages.length) {
        typeWriter(messages[step]);
        step++;
    } else {
        startSlideshow();
    }
}

function startSlideshow() {
    let index = 0;
    let img = document.getElementById("slide");
    img.style.display = "block";

    setInterval(() => {
        img.src = images[index];
        index = (index + 1) % images.length;
    }, 2000);
}

// floating particles
for (let i = 0; i < 30; i++) {
    let dot = document.createElement("div");
    dot.className = "floating";
    dot.style.left = Math.random() * 100 + "vw";
    dot.style.top = Math.random() * 100 + "vh";
    dot.style.animationDuration = (5 + Math.random() * 10) + "s";
    document.body.appendChild(dot);
}
</script>

</body>
</html>
