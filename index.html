<!DOCTYPE html>
<html>
<head>
    <title>Hey You :)</title>

    <style>
        body {
            background: linear-gradient(270deg, #ff9a9e, #fad0c4, #a18cd1, #fbc2eb);
            background-size: 800% 800%;
            animation: gradientBG 10s ease infinite;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 80px;
            transition: all 1s ease;
        }

        @keyframes gradientBG {
            0% {background-position: 0%}
            50% {background-position: 100%}
            100% {background-position: 0%}
        }

        button {
            padding: 14px 25px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            background: white;
            color: #ff4b5c;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.1);
        }

        .box {
            display: none;
            margin-top: 30px;
            opacity: 0;
            transition: opacity 1s;
        }

        .show {
            opacity: 1;
        }

        img {
            width: 260px;
            border-radius: 15px;
            margin-top: 20px;
            display: none;
            transition: opacity 1s;
        }

        #finalMsg {
            display: none;
            font-size: 20px;
            margin-top: 20px;
            opacity: 0;
            transition: opacity 1s;
        }
    </style>
</head>

<body>

<h1>🎂 Happy Birthday</h1>
<p>So… I made something for you</p>

<button id="startBtn" onclick="startExperience()">Start</button>

<div id="content" class="box">
    <p id="text"></p>
    <img id="slide">
    <p id="finalMsg"></p>
</div>

<audio id="bgmusic" loop>
    <source src="freesound_community-birthday-card-73275.mp3" type="audio/mpeg">
</audio>

<script>
let step = 0;
let i = 0;

const messages = [
    "Happiest birthday my shanuu 🎂",
    "I wasn't able to do anything special for you, but I wanted to make you feel special today",
    "You are someone really important to me",
    "Maybe we argue sometimes, maybe things get weird",
    "But no matter what happens, I’ll always be there",
    "I never let ego or anger stay when it comes to you",
    "You really mean a lot to me, more than I say",
    "I’m really glad you are in my life",
    "And yeah… I even like your family, especially your cute shivi 🙂",
    "So yeah… I tried making something instead",
    "Hope this makes you smile a little 🙂"
];

const images = [
    "shanu_1.jpg",
    "shanu_2.jpg",
    "shanu_3.jpg",
    "shanu_4.jpg",
    "shanu_5.jpg"
];

function startExperience() {
    document.getElementById("startBtn").style.display = "none";

    let content = document.getElementById("content");
    content.style.display = "block";
    setTimeout(() => content.classList.add("show"), 100);

    let music = document.getElementById("bgmusic");
    music.play().catch(() => {});

    playMessages();
}

function typeWriter(text, callback) {
    let speed = 30;
    document.getElementById("text").innerHTML = "";
    i = 0;

    function typing() {
        if (i < text.length) {
            document.getElementById("text").innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        } else if (callback) {
            callback();
        }
    }
    typing();
}

function playMessages() {
    if (step < messages.length) {
        typeWriter(messages[step], () => {
            step++;
            setTimeout(playMessages, 1500);
        });
    } else {
        startSlideshow();
    }
}

function startSlideshow() {
    let index = 0;
    let img = document.getElementById("slide");
    let finalMsg = document.getElementById("finalMsg");

    img.style.display = "block";

    let interval = setInterval(() => {
        img.style.opacity = 0;

        setTimeout(() => {
            img.src = images[index];
            img.style.opacity = 1;
            index++;
        }, 500);

        if (index === images.length) {
            clearInterval(interval);

            setTimeout(() => {
                img.style.display = "none";
                finalMsg.style.display = "block";
                finalMsg.innerText = "That’s it… just wanted to make you smile 🙂";
                setTimeout(() => finalMsg.style.opacity = 1, 100);
            }, 2000);
        }
    }, 2000);
}
</script>

</body>
</html>
