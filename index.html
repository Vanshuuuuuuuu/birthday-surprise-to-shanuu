<!DOCTYPE html>
<html>
<head>
    <title>Hey You :)</title>

    <style>
        body {
            background: linear-gradient(270deg, #ff9a9e, #fad0c4, #a18cd1, #fbc2eb);
            background-size: 800% 800%;
            animation: gradientBG 10s ease infinite;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 80px;
        }

        @keyframes gradientBG {
            0% {background-position: 0%}
            50% {background-position: 100%}
            100% {background-position: 0%}
        }

        button {
            padding: 14px 25px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            background: white;
            color: #ff4b5c;
            cursor: pointer;
        }

        .box {
            display: none;
            margin-top: 30px;
        }

        img {
            width: 260px;
            border-radius: 15px;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>

<body>

<h1>🎂 Happy Birthday</h1>
<p>I made something for you 🙂</p>

<button onclick="nextStep()">Start</button>

<div id="content" class="box">
    <p id="text"></p>
    <img id="slide">
</div>
<audio id="bgmusic" loop>
    <source src="freesound_community-birthday-card-73275.mp3" type="audio/mpeg">
</audio>
<script>
let step = 0;

const messages = [
    "Happiest birthday my shanuu 🎂",
    "I wasn’t able to do anything special for you, but I wanted to make you feel special today",
    "You are someone really important to me",
    "Maybe we argue sometimes, maybe things get weird",
    "But no matter what happens, I’ll always be there",
    "I never let ego or anger stay when it comes to you",
    "You really mean a lot to me, more than I say",
    "I’m really glad you are in my life",
    "And yeah… I even like your family, especially your cute shivi 🙂",
    "So yeah… I tried making something instead",
    "Hope this makes you smile a little 🙂"
];

const images = [
    "shanu_1.jpg",
    "shanu_2.jpg",
    "shanu_3.jpg",
    "shanu_4.jpg",
    "shanu_5.jpg"
];

function nextStep() {
    document.getElementById("content").style.display = "block";

    // play music
    let music = document.getElementById("bgmusic");
    if (music.paused) {
        music.play();
    }

    if (step < messages.length) {
        document.getElementById("text").innerText = messages[step];
        step++;
    } else {
        startSlideshow();
    }
}

function startSlideshow() {
    let index = 0;
    let img = document.getElementById("slide");
    img.style.display = "block";

    setInterval(function() {
        img.src = images[index];
        index = (index + 1) % images.length;
    }, 2000);
}
</script>

</body>
</html>
