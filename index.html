<!DOCTYPE html>
<html>
<head>
    <title>Hey You :)</title>

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #e2e8f0;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 80px;
        }

        h1 {
            font-size: 38px;
        }

        button {
            padding: 12px 22px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            background-color: #38bdf8;
            color: #0f172a;
            cursor: pointer;
        }

        img {
            width: 240px;
            border-radius: 15px;
            margin-top: 20px;
            display: none;
        }

        .box {
            margin-top: 30px;
            display: none;
        }
    </style>
</head>

<body>

<h1>🎂 Happy Birthday</h1>
<p>I made something small for you...</p>

<button onclick="nextStep()">Start</button>

<div id="content" class="box">
    <p id="text"></p>
    <img id="slide">
</div>

<script>
let step = 0;
let i = 0;

const messages = [
    "Okay so… I wasn’t sure what to get you 😅",
    "So I tried making something instead",
    "This actually took effort ngl 😭",
    "But yeah… you’re really special",
    "Talking to you just feels nice",
    "So I thought you deserved something like this",
];

const images = [
    "shanu_1.jpg",
    "shanu_2.jpg",
    "shanu_3.jpg",
    "shanu_4.jpg",
    "shanu_5.jpg"
];

function typeWriter(text, callback) {
    let speed = 30;
    document.getElementById("text").innerHTML = "";
    i = 0;

    function typing() {
        if (i < text.length) {
            document.getElementById("text").innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        } else if (callback) {
            callback();
        }
    }
    typing();
}

function nextStep() {
    document.getElementById("content").style.display = "block";

    if (step < messages.length) {
        typeWriter(messages[step]);
        step++;
    } else {
        startSlideshow();
    }
}

function startSlideshow() {
    let index = 0;
    let img = document.getElementById("slide");
    img.style.display = "block";

    setInterval(() => {
        img.src = images[index];
        index = (index + 1) % images.length;
    }, 2000);
}
</script>

</body>
</html>
