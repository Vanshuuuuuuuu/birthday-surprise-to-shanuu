<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hey You :)</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: linear-gradient(270deg, #ff9a9e, #fad0c4, #a18cd1, #fbc2eb);
    background-size: 800% 800%;
    animation: gradientBG 10s ease infinite;
    font-family: Arial, sans-serif;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* animated background */
@keyframes gradientBG {
    0% {background-position: 0%}
    50% {background-position: 100%}
    100% {background-position: 0%}
}

/* main card */
.container {
    width: 90%;
    max-width: 400px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 25px;
    text-align: center;
    box-shadow: 0 0 30px rgba(0,0,0,0.2);
}

/* heading */
h1 {
    font-size: 28px;
    margin-bottom: 10px;
}

/* button */
button {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: white;
    color: #ff4b5c;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

/* text area */
#text {
    margin-top: 20px;
    font-size: 16px;
    min-height: 60px;
}

/* image */
img {
    width: 100%;
    border-radius: 15px;
    margin-top: 15px;
    display: none;
    transition: opacity 1s;
}

/* final message */
#finalMsg {
    margin-top: 15px;
    display: none;
    font-size: 18px;
    opacity: 0;
    transition: opacity 1s;
}

/* floating hearts */
.heart {
    position: fixed;
    bottom: -10px;
    color: white;
    font-size: 18px;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    from {transform: translateY(0);}
    to {transform: translateY(-100vh);}
}
</style>
</head>

<body>

<div class="container">
    <h1>🎂 Happy Birthday</h1>
    <p>So… I made something for you</p>

    <button id="startBtn" onclick="startExperience()">Start</button>

    <div id="content">
        <p id="text"></p>
        <img id="slide">
        <p id="finalMsg"></p>
    </div>
</div>

<audio id="bgmusic" loop>
    <source src="freesound_community-birthday-card-73275.mp3" type="audio/mpeg">
</audio>

<script>
let step = 0;
let i = 0;

const messages = [
    "Happiest birthday my shanuu 🎂",
    "I wasn't able to do anything special for you, but I wanted to make you feel special today",
    "You are someone really important to me",
    "Maybe we argue sometimes, maybe things get weird",
    "But no matter what happens, I’ll always be there",
    "You really mean a lot to me",
    "I’m really glad you are in my life",
    "So yeah… I tried making something instead 🙂"
];

const images = [
    "shanu_1.jpg",
    "shanu_2.jpg",
    "shanu_3.jpg",
    "shanu_4.jpg",
    "shanu_5.jpg"
];

function startExperience() {
    document.getElementById("startBtn").style.display = "none";

    let music = document.getElementById("bgmusic");
    music.play().catch(()=>{});

    playMessages();
    createHearts();
}

function typeWriter(text, callback) {
    let speed = 30;
    document.getElementById("text").innerHTML = "";
    i = 0;

    function typing() {
        if (i < text.length) {
            document.getElementById("text").innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        } else if (callback) {
            callback();
        }
    }
    typing();
}

function playMessages() {
    if (step < messages.length) {
        typeWriter(messages[step], () => {
            step++;
            setTimeout(playMessages, 1500);
        });
    } else {
        startSlideshow();
    }
}

function startSlideshow() {
    let index = 0;
    let img = document.getElementById("slide");
    let finalMsg = document.getElementById("finalMsg");

    img.style.display = "block";

    let interval = setInterval(() => {
        img.style.opacity = 0;

        setTimeout(() => {
            img.src = images[index];
            img.style.opacity = 1;
            index++;
        }, 500);

        if (index === images.length) {
            clearInterval(interval);

            setTimeout(() => {
                img.style.display = "none";
                finalMsg.style.display = "block";
                finalMsg.innerText = "That’s it… just wanted to make you smile 🙂";
                setTimeout(() => finalMsg.style.opacity = 1, 100);
            }, 2000);
        }
    }, 2000);
}

/* floating hearts */
function createHearts() {
    setInterval(() => {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerText = "❤";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (12 + Math.random() * 20) + "px";
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 6000);
    }, 500);
}
</script>

</body>
</html>
