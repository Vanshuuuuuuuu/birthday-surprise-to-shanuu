<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hey You :)</title>

<style>
body {
    margin:0;
    background: linear-gradient(270deg,#ff9a9e,#fad0c4,#a18cd1,#fbc2eb);
    background-size:800% 800%;
    animation:bg 10s infinite;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

@keyframes bg{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}

.container{
    width:90%;
    max-width:400px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(12px);
    padding:25px;
    border-radius:20px;
    text-align:center;
}

button{
    padding:10px 18px;
    border:none;
    border-radius:10px;
    background:white;
    color:#ff4b5c;
    cursor:pointer;
}

#text{min-height:60px;margin-top:15px;}

img{
    width:100%;
    border-radius:15px;
    margin-top:15px;
    display:none;
}

#finalMsg{
    display:none;
    margin-top:15px;
}

#secretBtn{
    display:none;
    margin-top:15px;
}

</style>
</head>

<body>

<div class="container">
<h1>🎂 Happy Birthday</h1>
<p>So… I made something for you</p>

<button id="startBtn" onclick="startExp()">Start</button>

<p id="text"></p>
<img id="slide">
<p id="finalMsg"></p>

<button id="secretBtn" onclick="showSecret()">Tap this 🙂</button>
<p id="secretMsg" style="display:none;"></p>

</div>

<audio id="music" loop>
<source src="freesound_community-birthday-card-73275.mp3">
</audio>

<script>
let i=0,step=0;

const msgs=[
"Happiest birthday my shanuu 🎂",
"I couldn’t do something big but I wanted this to feel special",
"You are someone really important to me",
"Even when things get weird, I still care",
"You really mean a lot to me",
"I’m glad you are in my life 🙂"
];

const imgs=["shanu_1.jpg","shanu_2.jpg","shanu_3.jpg","shanu_4.jpg","shanu_5.jpg"];

function startExp(){
document.getElementById("startBtn").style.display="none";
document.getElementById("music").play().catch(()=>{});
typeMsg();
hearts();
}

function typeMsg(){
if(step<msgs.length){
let txt=msgs[step];
let el=document.getElementById("text");
el.innerHTML="";
i=0;

function type(){
if(i<txt.length){
el.innerHTML+=txt.charAt(i);
i++;
setTimeout(type,30);
}else{
step++;
setTimeout(typeMsg,1200);
}
}
type();
}else{
slideShow();
}
}

function slideShow(){
let index=0;
let img=document.getElementById("slide");
img.style.display="block";

let inter=setInterval(()=>{
img.src=imgs[index];
index++;

if(index===imgs.length){
clearInterval(inter);

setTimeout(()=>{
img.style.display="none";
document.getElementById("finalMsg").style.display="block";
document.getElementById("finalMsg").innerText="That’s it… just wanted to make you smile 🙂";
confetti();

setTimeout(()=>{
document.getElementById("secretBtn").style.display="block";
},1500);

},2000);
}
},2000);
}

function showSecret(){
document.getElementById("secretMsg").style.display="block";
document.getElementById("secretMsg").innerText="Okay… secret is… you matter more than you think 🙂";
}

/* hearts */
function hearts(){
setInterval(()=>{
let h=document.createElement("div");
h.innerText="❤";
h.style.position="fixed";
h.style.bottom="0";
h.style.left=Math.random()*100+"vw";
h.style.fontSize="20px";
h.style.color="white";
h.style.animation="up 5s linear";
document.body.appendChild(h);
setTimeout(()=>h.remove(),5000);
},500);
}

/* confetti */
function confetti(){
for(let i=0;i<50;i++){
let c=document.createElement("div");
c.style.position="fixed";
c.style.width="6px";
c.style.height="6px";
c.style.background="white";
c.style.top="0";
c.style.left=Math.random()*100+"vw";
c.style.animation="fall 3s linear";
document.body.appendChild(c);
setTimeout(()=>c.remove(),3000);
}
}

</script>

</body>
</html>
